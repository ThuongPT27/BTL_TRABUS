<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - TRABUS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ============================== */
        /* CSS CHO FORM ĐĂNG NHẬP CƠ BẢN  */
        /* ============================== */
        body { display: flex; justify-content: center; align-items: center; background-color: #e9ecef; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 40px; width: 420px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .auth-tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid #eee; }
        .auth-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: bold; color: #888; transition: 0.3s; font-size: 16px; }
        .auth-tab.active { color: #1c2e4a; border-bottom: 3px solid #1c2e4a; margin-bottom: -2px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-size: 14px; font-weight: bold; }
        /* Đã gộp thêm thẻ select vào đây để đồng bộ style */
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; outline: none; background: #fdfdfd; font-size: 14px; box-sizing: border-box; cursor: pointer; }
        .form-group input:focus, .form-group select:focus { border-color: #1c2e4a; }
        .btn-submit { background: #1c2e4a; color: white; border: none; padding: 15px; cursor: pointer; width: 100%; font-weight: bold; border-radius: 30px; transition: 0.3s; font-size: 16px; margin-top: 10px; }
        .btn-submit:hover { background: #0d1726; }

        /* ============================== */
        /* CSS CHO MODAL POPUP ADMIN      */
        /* ============================== */
        .modal-overlay {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-box { background: white; width: 480px; border-radius: 16px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 20px; color: #888; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .close-btn:hover { color: #333; }
        .modal-header { display: flex; align-items: center; margin-bottom: 25px; }
        .header-icon { background-color: #ffebee; color: #d32f2f; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; margin-right: 15px; }
        .header-text h2 { font-size: 18px; color: #333; margin: 0 0 5px 0; }
        .header-text p { font-size: 13px; color: #666; margin: 0; }
        
        .input-wrapper { position: relative; }
        .input-wrapper span { position: absolute; top: 50%; left: 15px; transform: translateY(-50%); color: #888; font-size: 16px; }
        .input-wrapper input { width: 100%; padding: 14px 15px 14px 45px !important; border: 2px solid transparent !important; border-radius: 8px !important; outline: none; background: #f0f4f8 !important; font-size: 14px; color: #333; transition: 0.2s; box-sizing: border-box;}
        .input-wrapper input:focus { border-color: #333 !important; background: white !important; }
        
        .action-buttons { display: flex; gap: 15px; margin-top: 30px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; border: none; }
        .btn-cancel { background: white; color: #333; border: 1px solid #ccc; }
        .btn-cancel:hover { background: #f9f9f9; border-color: #888; }
        .btn-admin-submit { background: #d32f2f; color: white; }
        .btn-admin-submit:hover { background: #b71c1c; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h3 style="text-align: center; margin-top: -10px; margin-bottom: 20px; color: #555;">DÀNH CHO HÀNH KHÁCH</h3>

        <div class="auth-tabs">
            <div class="auth-tab active" id="tabLogin">Đăng Nhập</div>
            <div class="auth-tab" id="tabRegister">Đăng Ký</div>
        </div>
        
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="username" placeholder="Tên tài khoản">
        </div>

        <div class="form-group" id="emailGroup" style="display: none;">
            <label>Email</label>
            <input type="email" id="email" placeholder="Nhập địa chỉ email của bạn">
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="Mật khẩu">
        </div>

        <div class="form-group" id="confirmPasswordGroup" style="display: none;">
            <label>Xác nhận mật khẩu</label>
            <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
        </div>

        <div class="form-group" id="roleGroup" style="display: none;">
            <label>Vai trò truy cập</label>
            <select id="roleSelect">
                <option value="user">Hành khách (Chỉ tra cứu)</option>
                <option value="admin">Quản trị viên (Cập nhật dữ liệu)</option>
            </select>
        </div>
        
        <button id="submitAuthBtn" class="btn-submit">ĐĂNG NHẬP</button>
        
        <div style="text-align: center; margin-top: 25px; line-height: 1.8;">
            <a href="index.html" style="color: #666; text-decoration: none; font-size: 14px; display: block;">⬅ Quay lại Trang chủ</a>
            <a href="#" id="openAdminModal" style="color: #d32f2f; text-decoration: underline; font-weight: bold; font-size: 13px; display: block; margin-top: 10px;"> Đăng nhập Quản trị viên </a>
        </div>
    </div>

    <div class="modal-overlay" id="adminModal">
        <div class="modal-box">
            <span class="close-btn" id="closeAdminModal">✕</span>

            <div class="modal-header">
                <div class="header-icon"></div>
                <div class="header-text">
                    <h2>Đăng nhập QLHT TRABUS</h2>
                    <p>Sử dụng tài khoản Quản trị viên của bạn</p>
                </div>
            </div>

            <div class="form-group">
                <label>Tên đăng nhập</label>
                <div class="input-wrapper">
                    <span>👤</span>
                    <input type="text" id="adminUsername" placeholder="Tên tài khoản quản trị">
                </div>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <div class="input-wrapper">
                    <span>🔒</span>
                    <input type="password" id="adminPassword" placeholder="Mật khẩu">
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-modal btn-cancel" id="cancelAdminModal">Hủy</button>
                <button class="btn-modal btn-admin-submit" id="submitAdminAuthBtn"> Đăng nhập</button>
            </div>
        </div>
    </div>

    <script src="log.js"></script>
</body>
</html>
